<header class="header">

    <!-- LEFT -->
    <div class="header-left">

        <!-- MENU MOBILE -->
        <button
            id="btnMenuMobile"
            class="menu-mobile-btn"
        >

            <i class="fa-solid fa-bars"></i>

        </button>

        <!-- LOGOS -->
        <div class="logo-box">

            <!-- CRV -->
            <img
                src="static/imagens/logo1.png"
                class="logo-crv"
                alt="CRV"
            >

            <!-- LOGO LIGHT -->
            <img
                src="static/imagens/logoclaro.png"
                class="logo-mindflow logo-light"
                alt="MindFlow"
            >

            <!-- LOGO DARK -->
            <img
                src="static/imagens/logoescuro.png"
                class="logo-mindflow logo-dark"
                alt="MindFlow"
            >

            <!-- TEXTOS -->
            <div class="logo-texts">

                <span class="logo-subtitle">

                    Painel Inteligente para Psicólogos

                </span>

            </div>

        </div>

    </div>

    <!-- CENTER -->
    <div class="header-center">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Buscar técnicas, emoções, insights, artigos..."
            >

        </div>

    </div>

    <!-- RIGHT -->
    <div class="header-right">

        <!-- RELÓGIO -->
        <span
            id="relogio"
            class="clock-box"
        >

            00:00:00

        </span>

        <!-- CLIMA -->
        <div
            class="weather-box"
            id="weatherBox"
        >

            <img
                src="static/imagens/ico_dia.png"
                alt="Clima"
                class="icone-clima-img"
                id="iconeClimaImg"
            >

            <span
                class="weather-temp"
                id="temperatura"
            >

                --°C

            </span>

        </div>

        <!-- TEMA -->
        <button
            id="btnTema"
            class="theme-toggle"
            aria-label="Alternar tema"
        >

            <i class="fas fa-moon"></i>

        </button>

        <!-- USER -->
        <div class="user-box">

            <!-- AVATAR -->
            <div class="user-avatar">

                <span class="user-avatar-letter">
                    V
                </span>

            </div>

            <!-- INFO -->
            <div class="user-info">

                <strong class="user-name">

                    Visitante

                </strong>

                <span class="user-role">

                    Modo Exploração

                </span>

            </div>

        </div>

    </div>

</header>

<!-- MODAL CLIMA -->
<div
    class="modal-clima"
    id="modalClima"
>

    <div class="modal-clima-content">

        <!-- HEADER -->
        <div class="modal-clima-header">

            <h3>

                Clima • Tatuí/SP

            </h3>

            <button
                id="closeModalClima"
                class="modal-clima-close"
            >

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <!-- BODY -->
        <div
            class="modal-clima-body"
            id="modalClimaBody"
        >

            <div class="previsao-loading">

                Carregando previsão climática...

            </div>

        </div>

    </div>

</div>
