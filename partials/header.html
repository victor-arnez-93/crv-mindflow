<header class="header">

    <div class="header-left">

        <div class="logo-box">

            <div class="logo-icon">
                <i class="fa-solid fa-brain"></i>
            </div>

            <div class="logo-texts">

                <h1>CRV MindFlow</h1>

                <span>
                    Painel Inteligente para Psicólogos
                </span>

            </div>

        </div>

    </div>

    <div class="header-center">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                placeholder="Buscar insights, materiais, artigos..."
            >

        </div>

    </div>

    <div class="header-right">

        <div class="weather-box">

            <i class="fa-solid fa-cloud-sun"></i>

            <span>22°C</span>

        </div>

        <div class="clock-box" id="headerClock">
            00:00
        </div>

        <button class="theme-toggle" id="themeToggle">

            <i class="fa-solid fa-moon"></i>

        </button>

        <div class="user-box">

            <div class="user-avatar">
                V
            </div>

            <div class="user-info">

                <strong>
                    Visitante
                </strong>

                <span>
                    Acesso limitado
                </span>

            </div>

        </div>

    </div>

</header>
